<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="Viewport" content="width=device-width, initial-scale=1.0">
        <title>UrStudyBuddy</title>
    </head>
    <body>

      <div id="nameOverlay" class="overlay">
        <div class="overlay-box">
          <h1>UrStudyBuddy</h1>
          <p>What should we call you?</p>
          <input type="text" id="nameInput" placeholder="Enter your name" maxlength="20" />
          <p id="errorMsg" class="error"></p>
          <button id="addBtn">Get goin'!</button>
        </div>
      </div>

      <div class="container">
        <h1>UrStudyBuddy</h1>
        <p>Your study companion. It is AI powered</p>

        <section>
          <h2>Make your Timetable</h2>
        </section>

        <section>
          <h2>Upload Notes and PDF</h2>
        </section>

        <section>
          <h2>Generate Summary</h2>
        </section>

        <section>
          <h2>Generate Quiz</h2>
        </section>

        <section>
          <h2>Homework Tracking</h2>
        </section>

        <section>
          <h2>Email your study materials</h2>
        </section>
      </div>

      <script type="module" src="/src/main.js"></script>
    </body>
</html>
