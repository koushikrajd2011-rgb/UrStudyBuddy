<!DOCTYPE html>
<html lang="em">
    <head>
        <title="UploadBuddy"></title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="/src/style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
      <h1>Timetable Maker</h1>
      <h3>Make your own customizable timetable</h3>
        
      <div class="container">
            <section>
               <h2>Week</h2>

               <table>
                <thead>
                    <tr>
                        <th>Monday</th>
                        <th>Tuesday</th>
                        <th>Wednesday</th>
                        <th>Thursday</th>
                        <th>Friday</th>
                        <th>Saturday</th>
                        <th>Sunday</th>
                    </tr>
                </thead>
                <tbody id="timetableBody"></tbody>
               </table>

               <button id="addRowBtn">+</button>
            </section>
        </div>

        <script type="module" src="/src/main.js"></script>
    </body>
</html>
